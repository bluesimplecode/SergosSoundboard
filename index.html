<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Meeres-Tacho &amp; Engelsstimmen</title>
<meta name="theme-color" content="#0a3d5c" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
<link rel="stylesheet" href="css/main.css" />
<link rel="stylesheet" href="css/ocean.css" />
<link rel="stylesheet" href="css/angel.css" />
<link rel="stylesheet" href="css/booming.css" />
<link rel="stylesheet" href="css/elements.css" />
<link rel="stylesheet" href="css/spellschools.css" />
</head>
<body>

<div id="app">

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="ocean">
      <span class="tab-icon">🌊</span>
      <span class="tab-label">Meeres-Tacho</span>
    </button>
    <button class="tab-btn" data-tab="angel">
      <span class="tab-icon">👼</span>
      <span class="tab-label">Talking Doll</span>
    </button>
    <button class="tab-btn" data-tab="booming">
      <span class="tab-icon">📢</span>
      <span class="tab-label">Booming Voice</span>
    </button>
    <button class="tab-btn" data-tab="elements">
      <span class="tab-icon">🔥</span>
      <span class="tab-label">Elements</span>
    </button>
    <button class="tab-btn" data-tab="schools">
      <span class="tab-icon">📖</span>
      <span class="tab-label">Spell Schools</span>
    </button>
  </nav>

  <main>

    <section id="tab-ocean" class="tab-panel ocean-theme active">
      <div class="ocean-bg" aria-hidden="true">
        <svg class="wave-layer wave-back" viewBox="0 0 1200 200" preserveAspectRatio="none">
          <path d="M0,100 C150,180 350,20 600,100 C850,180 1050,20 1200,100 L1200,200 L0,200 Z"></path>
        </svg>
        <svg class="wave-layer wave-front" viewBox="0 0 1200 200" preserveAspectRatio="none">
          <path d="M0,120 C200,40 400,160 600,100 C800,40 1000,160 1200,100 L1200,200 L0,200 Z"></path>
        </svg>
      </div>

      <div class="ocean-content">
        <h1 class="ocean-title">Meeres-Tacho</h1>

        <div class="shell-gauge-wrap">
          <svg class="shell-gauge" viewBox="0 0 320 240">
            <defs>
              <radialGradient id="shellGrad" cx="50%" cy="22%" r="85%">
                <stop offset="0%" stop-color="#fdf6ff" />
                <stop offset="45%" stop-color="#f3d9e8" />
                <stop offset="75%" stop-color="#d9b8dd" />
                <stop offset="100%" stop-color="#a888c2" />
              </radialGradient>
              <linearGradient id="shellRidge" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
                <stop offset="100%" stop-color="#8a5fa0" stop-opacity="0.55" />
              </linearGradient>
            </defs>

            <!-- offene Herzmuschel: zwei gerundete Lappen, unten am Scharnier zusammenlaufend -->
            <path class="shell-front" d="M160,205 C238,193 300,158 296,100 C292,48 240,28 160,66 C80,28 28,48 24,100 C20,158 82,193 160,205 Z" fill="url(#shellGrad)" stroke="#8a5fa0" stroke-width="2.5"/>

            <!-- Rillen (strahlenförmig vom Scharnier zum Rand, wie bei einer Herzmuschel) -->
            <g class="shell-ribs" stroke="url(#shellRidge)" stroke-width="2.5" fill="none">
              <line x1="160" y1="205" x2="160" y2="66" />
              <line x1="160" y1="205" x2="205" y2="150" />
              <line x1="160" y1="205" x2="252" y2="128" />
              <line x1="160" y1="205" x2="283" y2="88" />
              <line x1="160" y1="205" x2="252" y2="45" />
              <line x1="160" y1="205" x2="115" y2="150" />
              <line x1="160" y1="205" x2="68" y2="128" />
              <line x1="160" y1="205" x2="37" y2="88" />
              <line x1="160" y1="205" x2="68" y2="45" />
            </g>

            <!-- Tacho: Mittelpunkt = Scharnier der Herzmuschel (160,205) -->
            <path class="gauge-track" d="M82,205 A78,78 0 0 1 238,205" />
            <path class="gauge-fill" id="gaugeFill" d="M82,205 A78,78 0 0 1 238,205" />
            <g id="gaugeTicks"></g>
            <line id="needle" class="needle" x1="160" y1="205" x2="160" y2="137" />
            <circle cx="160" cy="205" r="8" class="needle-hub" />
          </svg>

          <div class="speed-readout">
            <span id="speedValue">0.0</span>
            <span class="speed-unit">km/h</span>
          </div>
        </div>

        <div class="analogy-box">
          <span id="analogyText">Windstille</span>
        </div>

        <div class="slider-wrap">
          <label for="speedSlider" class="slider-label">
            Geschwindigkeit: <span id="feetValue">0</span> feet / 6s
          </label>
          <input type="range" id="speedSlider" min="0" max="50" step="5" value="0" />
          <div class="slider-scale">
            <span>0</span><span>10</span><span>20</span><span>30</span><span>40</span><span>50</span>
          </div>
        </div>
      </div>
    </section>

    <section id="tab-angel" class="tab-panel angel-theme">
      <div class="angel-bg" aria-hidden="true">
        <div class="halo-glow"></div>
      </div>

      <div class="angel-content">
        <svg class="angel-hero-icon" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-label="Engel">
          <ellipse cx="30" cy="13" rx="13" ry="4" fill="none" stroke="#e0ac3f" stroke-width="2.2"/>
          <path d="M12,40 C3,36 1,49 7,54 C11,50 13,44 13,39 Z" fill="#f0d9ff" stroke="#d9b8ec" stroke-width="1"/>
          <path d="M48,40 C57,36 59,49 53,54 C49,50 47,44 47,39 Z" fill="#f0d9ff" stroke="#d9b8ec" stroke-width="1"/>
          <path d="M30,31 C19,35 15,48 15,56 L45,56 C45,48 41,35 30,31 Z" fill="#ffffff" stroke="#e6d4f0" stroke-width="1"/>
          <circle cx="30" cy="23" r="9.5" fill="#ffe4c4"/>
        </svg>

        <div id="angelGrid" class="angel-grid"></div>
      </div>
    </section>

    <section id="tab-booming" class="tab-panel booming-theme">
      <div class="booming-bg" aria-hidden="true">
        <svg class="booming-rings" viewBox="0 0 420 420">
          <circle cx="210" cy="210" r="90" />
          <circle cx="210" cy="210" r="90" />
          <circle cx="210" cy="210" r="90" />
        </svg>
      </div>

      <div class="booming-content">
        <h1 class="booming-title">Booming Voice</h1>
        <p class="booming-subtitle">Nimm deine Stimme auf &mdash; sie wird tief und dröhnend</p>

        <div id="boomingGrid" class="booming-grid"></div>
      </div>
    </section>

    <section id="tab-elements" class="tab-panel elements-theme">
      <div class="elements-bg" aria-hidden="true"></div>

      <div class="elements-content">
        <h1 class="elements-title">Elements</h1>
        <p class="elements-subtitle">Ein Sound für jede DnD-5e-Schadensart</p>

        <div id="elementsGrid" class="elements-grid"></div>
      </div>
    </section>

    <section id="tab-schools" class="tab-panel schools-theme">
      <div class="schools-bg" aria-hidden="true"></div>

      <div class="schools-content">
        <h1 class="schools-title">Spell Schools</h1>
        <p class="schools-subtitle">Ein Sound für jede Zauberschule</p>

        <div id="schoolsGrid" class="schools-grid"></div>
      </div>
    </section>

  </main>

</div>

<script src="js/storage.js"></script>
<script src="js/noiseSynth.js"></script>
<script src="js/oceanTab.js"></script>
<script src="js/angelAudio.js"></script>
<script src="js/boomingAudio.js"></script>
<script src="js/angelTab.js"></script>
<script src="js/boomingTab.js"></script>
<script src="js/elementsTab.js"></script>
<script src="js/spellSchoolsTab.js"></script>
<script src="js/app.js"></script>
</body>
</html>
